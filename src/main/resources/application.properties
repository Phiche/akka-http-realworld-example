# Server configuration
server.port=9000

# Spring Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/real_world_dev
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Properties
spring.jpa.hibernate.ddl-auto=none # Let Flyway handle schema
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=secret # Default secret, should be overridden by environment variable
# jwt.expiration-ms defines the expiration time for JWT tokens in milliseconds
# Default: 86400000 ms (24 hours)
jwt.expiration-ms=86400000

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Allow overriding with environment variables (example for JWT secret)
# The default secret key MUST be at least 256 bits (32 bytes) for HS256.
# Replace this with a strong, randomly generated key in a real application.
jwt.secret=${SECRET_KEY_ENV:SuperSecretKeyForRealworldAppThatIsLongEnoughForHS256}
spring.datasource.url=jdbc:postgresql://${DB_HOST_ENV:localhost}:${DB_PORT_ENV:5432}/${DB_DB_ENV:real_world_dev}
spring.datasource.username=${DB_USER_ENV:postgres}
spring.datasource.password=${DB_PASS_ENV:postgres}
